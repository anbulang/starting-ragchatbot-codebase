version: '3.8'

services:
  rag-chatbot:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    env_file:
      - .env
    volumes:
      # Persist ChromaDB data
      - ./backend/chroma_db:/app/backend/chroma_db
      # Mount docs for document loading (optional, for development)
      - ./docs:/app/docs
      # Mount backend code for hot reload during development
      - ./backend:/app/backend
      # Mount frontend static files for instant updates
      - ./frontend:/app/frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/courses"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Service for code quality checks
  quality-tools:
    build: .
    volumes:
      - .:/app
      - ./backend:/app/backend
      - ./scripts:/app/scripts
    working_dir: /app
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    env_file:
      - .env
    profiles:
      - tools
    command: /bin/bash